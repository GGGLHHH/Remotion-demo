name: Release

# 由本地 `pnpm release`（bumpp）推送的 v* tag 触发：校验版本一致 → 构建 → 发布两个包。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # 供 npm provenance / 可信发布（trusted publishing）用

jobs:
  release:
    name: Publish @gedatou/{shared,editor} to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./packages/editor/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version $tag_version 与 packages/editor 版本 $pkg_version 不一致"
            exit 1
          fi

      - name: Build packages
        run: pnpm build

      # OIDC 可信发布（Trusted Publishing）：无 NPM_TOKEN，npm 自动附带 provenance 溯源。
      # 前置：① 首个版本已在 npm 存在（新包首发需本地手动发一次，OIDC 无法引导不存在的包）；
      #       ② 已在 npmjs.com 各包 Settings → Trusted publishing 配好本仓库 + 本 workflow。
      # 发布顺序由 pnpm 按 workspace 依赖拓扑决定（shared 先于 editor），
      # 并把 editor 里的 "@gedatou/shared": "workspace:*" 替换为真实版本号。
      - name: Publish to npm (OIDC trusted publishing)
        run: pnpm --filter "@gedatou/*" publish --access public --no-git-checks
